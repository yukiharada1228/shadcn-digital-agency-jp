name: Registry

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/registry/**"
      - "src/components/**"
      - "src/styles/**"
      - "scripts/generate-registry.ts"

jobs:
  build-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate registry.json
        run: npm run registry:generate

      - name: Fail if registry.json changed
        run: git diff --exit-code registry.json
