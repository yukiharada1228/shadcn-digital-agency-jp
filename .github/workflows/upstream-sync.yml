name: Upstream Sync

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Report upstream diff
        run: pnpm diff:upstream | tee upstream-report.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: upstream-report
          path: upstream-report.txt
