name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Verify upstream submodule
        run: npm run check:upstream

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Demo build
        run: npm run demo:build

      - name: Unit + a11y tests
        run: npm test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser a11y tests
        run: npm run test:browser-a11y

      - name: Theme is up to date
        run: npm run check:theme

      - name: Registry is up to date
        run: npm run registry:test

      - name: License / attribution check
        run: npm run license:check
