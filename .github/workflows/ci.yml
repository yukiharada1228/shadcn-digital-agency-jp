name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify upstream submodule
        run: pnpm check:upstream

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Demo build
        run: pnpm demo:build

      - name: Unit + a11y tests
        run: pnpm test

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser a11y tests
        run: pnpm test:browser-a11y

      - name: Theme is up to date
        run: pnpm check:theme

      - name: Registry is up to date
        run: pnpm registry:test

      - name: License / attribution check
        run: pnpm license:check
